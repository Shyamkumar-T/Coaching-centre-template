<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | EliteAcademy ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/views/AdminLogin.css">
</head>

<body class="admin-login-body">

    <div class="login-container">

        <!-- Top gradient stripe via CSS ::before -->

        <div class="login-header">
            <div class="login-logo">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h2>EliteAcademy ERP</h2>
            <p>Sign in to the staff management portal</p>
        </div>

        <form id="adminLoginForm">

            <div class="form-group">
                <label for="email">Email Address</label>
                <i class="fa-regular fa-envelope"></i>
                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="admin@eliteacademy.edu"
                    value="admin@eliteacademy.edu"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter your password"
                    value="password"
                    required
                >
            </div>

            <div class="forgot-password">
                <span style="color:#64748b; font-size:0.875rem;">Demo: admin@eliteacademy.edu / password</span>
                <a href="#">Forgot?</a>
            </div>

            <button type="submit" id="loginSubmitBtn" class="login-btn-full">
                Sign In to Dashboard <i class="fa-solid fa-arrow-right"></i>
            </button>

            <p id="loginError"></p>

        </form>

    </div>

    <script src="../js/views/AdminLogin.js"></script>

</body>

</html>
