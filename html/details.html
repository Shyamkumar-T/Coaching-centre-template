<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Coaching Institute | Details & Pricing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <style>
        .details-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
        }

        .details-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .details-header h1 {
            color: var(--clr-primary);
            margin-bottom: 1rem;
        }

        .course-details-card {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            padding: 2rem;
            border: 1px solid var(--clr-border);
        }

        .course-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--clr-bg);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .course-title-row h2 {
            color: var(--clr-text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .price-box {
            background: var(--clr-bg);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            text-align: center;
        }

        .price-box h4 {
            color: var(--clr-text-muted);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-box .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--clr-primary);
        }

        .batch-timings {
            margin-top: 2rem;
        }

        .batch-timings h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--clr-secondary);
        }

        .timings-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .timings-list li {
            display: flex;
            justify-content: space-between;
            background: rgba(37, 99, 235, 0.03);
            padding: 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .batch-name {
            font-weight: 600;
            color: var(--clr-primary);
        }

        .batch-time {
            color: var(--clr-text-muted);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar" id="global-navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span class="logo-text">Elite<span class="highlight">Academy</span></span>
            </a>
            <div class="nav-links">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="courses.html" class="nav-link">Courses</a>
                <a href="details.html" class="nav-link active">Details & Pricing</a>
                <a href="faculty.html" class="nav-link">Faculty</a>
            </div>
            <div class="nav-actions">
                <a href="admin-login.html" class="login-btn"><i class="fa-regular fa-user"></i> Admin Login</a>
                <a href="admission.html" class="cta-btn primary-btn">Apply Now</a>
                <button class="menu-toggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
            </div>
        </div>
    </nav>
    <div class="mobile-menu" id="mobile-menu">
        <a href="../index.html" class="mobile-link">Home</a>
        <a href="about.html" class="mobile-link">About Us</a>
        <a href="courses.html" class="mobile-link">Courses</a>
        <a href="details.html" class="mobile-link active">Details & Pricing</a>
        <a href="faculty.html" class="mobile-link">Faculty</a>
        <a href="admission.html" class="mobile-link highlight-link">Apply for Admission</a>
    </div>

    <!-- Main Content -->
    <main class="details-container">
        <div class="details-header">
            <h1>Course Details & Pricing</h1>
            <p>Comprehensive breakdown of our program costs and batch schedules.</p>
        </div>

        <div id="details-content">
            <!-- Dynamically populated via script -->
        </div>
    </main>

    <footer class="global-footer" id="global-footer" style="margin-top:50px; padding: 2rem;">
        <div style="text-align:center; color:#ccc;">&copy; 2026 Elite Academy. All rights reserved. <br><a
                href="admin.html" style="color:#666; text-decoration:none;">Admin</a></div>
    </footer>

    <!-- Script versioning to ensure latest data is loaded -->
    <script src="../js/data.js?v=2"></script>
    <script>
        document.querySelector('.menu-toggle').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('open');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const courses = window.DB.courses;
            const batches = window.DB.batches;
            const container = document.getElementById('details-content');

            container.innerHTML = courses.map(course => {
                const courseBatches = batches.filter(b => b.course_id === course.course_id);
                const baseFee = parseInt(course.fee.replace(/[^0-9]/g, ''), 10);
                const twoYearFee = baseFee + 1000;

                return `
                    <div class="course-details-card">
                        <div class="course-title-row">
                            <h2><i class="fa-solid ${course.icon}"></i> ${course.name}</h2>
                            <a href="admission.html?course=${course.course_id}" class="outline-btn" style="text-decoration:none; padding: 0.5rem 1.5rem;">Apply Now</a>
                        </div>
                        
                        <p style="margin-bottom: 2rem; color: var(--clr-text-muted);">${course.description}</p>

                        <div class="pricing-grid">
                            <div class="price-box">
                                <h4>1-Year Program (Drop)</h4>
                                <div class="price">$${baseFee.toLocaleString()}</div>
                            </div>
                            <div class="price-box">
                                <h4>2-Year Foundation (11th & 12th)</h4>
                                <div class="price">$${twoYearFee.toLocaleString()}</div>
                            </div>
                        </div>

                        <div class="batch-timings">
                            <h3>Available Batch Timings</h3>
                            <ul class="timings-list">
                                ${courseBatches.map(b => `
                                    <li>
                                        <span class="batch-name">${b.name} Batch</span>
                                        <span class="batch-time"><i class="fa-regular fa-clock"></i> ${b.timings} (${b.mode})</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>

</html>
