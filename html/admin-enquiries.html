<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiries | EliteAcademy ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/views/AdminLayout.css">
    <link rel="stylesheet" href="../css/views/AdminEnquiries.css">
</head>

<body class="admin-body">

    <!-- Drawer Overlay -->
    <div class="drawer-overlay" id="drawerOverlay">
        <div class="drawer-panel" id="enquiryDrawer">
            <div class="drawer-header">
                <div>
                    <h2 style="margin:0;font-size:1.125rem;" id="drawerName">—</h2>
                    <p style="margin:0;font-size:0.8rem;color:#64748b;" id="drawerID">—</p>
                </div>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <span id="drawerStatus"></span>
                    <button class="drawer-close-btn" id="drawerCloseBtn"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <div class="drawer-body">

                <div>
                    <h3 style="margin:0 0 0.75rem;font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#94a3b8;">Contact Details</h3>
                    <div class="drawer-fields-grid">
                        <div class="drawer-field"><span class="drawer-field-label">Phone</span><span class="drawer-field-value" id="drawerPhone">—</span></div>
                        <div class="drawer-field"><span class="drawer-field-label">Email</span><span class="drawer-field-value" id="drawerEmail">—</span></div>
                        <div class="drawer-field"><span class="drawer-field-label">Parent/Guardian</span><span class="drawer-field-value" id="drawerParent">—</span></div>
                        <div class="drawer-field"><span class="drawer-field-label">Source</span><span class="drawer-field-value" id="drawerSource">—</span></div>
                    </div>
                </div>

                <hr style="border:none;border-top:1px solid #e2e8f0;">

                <div>
                    <h3 style="margin:0 0 0.75rem;font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#94a3b8;">Course Interest</h3>
                    <div class="drawer-fields-grid">
                        <div class="drawer-field"><span class="drawer-field-label">Course</span><span class="drawer-field-value" id="drawerCourse">—</span></div>
                        <div class="drawer-field"><span class="drawer-field-label">Batch Timing</span><span class="drawer-field-value" id="drawerBatchTiming">—</span></div>
                        <div class="drawer-field"><span class="drawer-field-label">Batch Type</span><span class="drawer-field-value" id="drawerBatchCategory">—</span></div>
                        <div class="drawer-field"><span class="drawer-field-label">Target Year</span><span class="drawer-field-value" id="drawerTargetYear">—</span></div>
                    </div>
                </div>

                <hr style="border:none;border-top:1px solid #e2e8f0;">

                <div>
                    <h3 style="margin:0 0 0.75rem;font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#94a3b8;">Follow-up</h3>
                    <div class="drawer-fields-grid">
                        <div class="drawer-field"><span class="drawer-field-label">Assigned To</span><span class="drawer-field-value" id="drawerCounsellor">—</span></div>
                        <div class="drawer-field"><span class="drawer-field-label">Follow-up Date</span><span class="drawer-field-value" id="drawerFollowUp">—</span></div>
                    </div>
                </div>

                <hr style="border:none;border-top:1px solid #e2e8f0;">

                <div class="drawer-field">
                    <span class="drawer-field-label">Notes</span>
                    <p id="drawerNotes" style="margin:0;font-size:0.875rem;color:#334155;line-height:1.6;">—</p>
                </div>

            </div>
            <div class="drawer-actions">
                <button class="admin-btn admin-btn-primary"><i class="fa-solid fa-user-check"></i> Convert to Student</button>
                <button class="admin-btn admin-btn-outline"><i class="fa-regular fa-pen-to-square"></i> Edit</button>
            </div>
        </div>
    </div>

    <div id="admin-app-container" style="display:flex; width:100%; overflow:hidden;">
        <div class="admin-main-wrapper">

            <main class="admin-content">

                <div class="admin-page-header">
                    <div>
                        <h1 class="admin-page-title">Enquiries</h1>
                        <p class="admin-page-subtitle">Manage all incoming leads and follow-ups.</p>
                    </div>
                    <button class="admin-btn admin-btn-primary"><i class="fa-solid fa-plus"></i> Add Enquiry</button>
                </div>

                <div class="admin-table-container">
                    <div class="filter-bar">
                        <input type="text" id="enquirySearch" placeholder="Search by name, ID, phone...">
                        <select id="courseFilter">
                            <option value="">All Courses</option>
                            <option>JEE</option>
                            <option>NEET</option>
                            <option>UPSC</option>
                            <option>SAT</option>
                        </select>
                        <select id="statusFilter">
                            <option value="">All Statuses</option>
                            <option>New Enquiry</option>
                            <option>Trial Class Booked</option>
                            <option>Follow-up Pending</option>
                            <option>Admitted</option>
                        </select>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Enquiry</th>
                                <th>Phone</th>
                                <th>Course</th>
                                <th>Preferred Timing</th>
                                <th>Counsellor</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="enquiryTableBody">
                        </tbody>
                    </table>
                </div>

            </main>
        </div>
    </div>

    <script src="../js/admin-data.js"></script>
    <script src="../js/views/AdminLayout.js"></script>
    <script src="../js/views/AdminEnquiries.js"></script>

</body>

</html>
